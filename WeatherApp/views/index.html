<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link href="/css/styles.css" rel="stylesheet" />
    <title>Weather Pulse</title>
  </head>
  <body
    class="bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 min-h-screen flex items-center justify-center p-4"
  >
    <div class="container mx-auto max-w-4xl">
      <div
        class="bg-white shadow-2xl rounded-2xl overflow-hidden transform transition-all duration-300 hover:scale-105"
      >
        <div class="grid md:grid-cols-2">
          <!-- Left Side: Search and Results -->
          <div class="p-8 bg-gray-50 flex flex-col justify-center">
            <h1
              class="text-3xl font-bold text-gray-800 text-center mb-6 flex items-center justify-center"
            >
              <i class="ri-cloud-line mr-3 text-blue-500"></i>
              Weather Pulse
            </h1>
            <div class="mb-6">
              <input
                id="city-input"
                type="text"
                placeholder="Enter city name"
                class="w-full px-4 py-3 border-2 border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
              />
            </div>
            <button
              id="get-weather"
              class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 transition flex items-center justify-center"
            >
              <i class="ri-search-line mr-2"></i>
              Get Weather
            </button>

            <div
              id="weather-result"
              class="hidden mt-6 p-6 bg-white border-2 border-blue-100 rounded-lg shadow-md"
            >
              <!-- Weather data will populate here -->
            </div>
          </div>

          <!-- Right Side: Weather Illustration -->
          <div
            class="hidden md:flex items-center justify-center bg-gradient-to-br from-blue-300 to-purple-400 p-8"
          >
            <div class="text-center">
              <div id="weather-icon" class="text-9xl text-white mb-4">
                <i class="ri-sun-line"></i>
              </div>
              <div
                id="weather-description"
                class="text-white text-2xl font-semibold"
              >
                Waiting for Weather
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/js/script.js"></script>
  </body>
</html>
